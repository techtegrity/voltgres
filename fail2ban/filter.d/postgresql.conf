[Definition]

# Match PostgreSQL authentication failures
# Log line prefix: %h %t [%p] %q%u@%d
# Examples:
#   192.168.1.1 2026-03-31 14:34:52 UTC [1234] FATAL:  password authentication failed for user "postgres"
#   192.168.1.1 2026-03-31 14:34:52 UTC [1234] FATAL:  no pg_hba.conf entry for host "192.168.1.1", user "postgres", database "postgres", SSL off

failregex = ^<HOST> .+ \[\d+\] (?:\S+@\S+ )?FATAL:\s+password authentication failed for user .+$
            ^<HOST> .+ \[\d+\] (?:\S+@\S+ )?FATAL:\s+no pg_hba\.conf entry for host .+$

ignoreregex =

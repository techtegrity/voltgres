[Definition]

# Action to ban/unban IPs using the DOCKER-USER iptables chain.
# Standard INPUT chain rules don't affect Docker-forwarded traffic,
# so we must use DOCKER-USER which Docker processes before forwarding.

actionstart = iptables -N f2b-postgresql 2>/dev/null || true
              iptables -A f2b-postgresql -j RETURN
              iptables -I DOCKER-USER -p tcp -m multiport --dports <port> -j f2b-postgresql

actionstop = iptables -D DOCKER-USER -p tcp -m multiport --dports <port> -j f2b-postgresql 2>/dev/null || true
             iptables -F f2b-postgresql 2>/dev/null || true
             iptables -X f2b-postgresql 2>/dev/null || true

actionban = iptables -I f2b-postgresql 1 -s <ip> -j DROP

actionunban = iptables -D f2b-postgresql -s <ip> -j DROP 2>/dev/null || true

[Init]

port = 5432

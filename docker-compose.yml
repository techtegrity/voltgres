services:
  voltgres:
    build:
      context: .
      args:
        NEXT_PUBLIC_GOOGLE_ENABLED: ${NEXT_PUBLIC_GOOGLE_ENABLED:-false}
    container_name: voltgres
    restart: unless-stopped
    ports:
      - "${VOLTGRES_PORT:-3000}:3000"
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - VOLTGRES_DB_PATH=/app/data/voltgres.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DOMAIN=${DOMAIN:-}
      - NEXT_PUBLIC_GOOGLE_ENABLED=${NEXT_PUBLIC_GOOGLE_ENABLED:-false}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voltgres}
    volumes:
      - voltgres-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voltgres-net

  postgres:
    image: postgres:16-alpine
    container_name: voltgres-postgres
    restart: unless-stopped
    entrypoint: ["/pg-entrypoint.sh"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voltgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - DOMAIN=${DOMAIN:-}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-ssl:/var/lib/postgresql/ssl
      - postgres-logs:/var/log/postgresql
      - caddy-data:/caddy-data:ro
      - ./pg-entrypoint.sh:/pg-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voltgres-net

  fail2ban:
    image: alpine:3.21
    container_name: voltgres-fail2ban
    restart: unless-stopped
    entrypoint: ["/fail2ban-entrypoint.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      - FAIL2BAN_POSTGRES_PORTS=${POSTGRES_PORT:-5432}
      - FAIL2BAN_MAXRETRY=${FAIL2BAN_MAXRETRY:-5}
      - FAIL2BAN_BANTIME=${FAIL2BAN_BANTIME:-3600}
      - FAIL2BAN_FINDTIME=${FAIL2BAN_FINDTIME:-600}
    volumes:
      - postgres-logs:/var/log/postgresql:ro
      - fail2ban-data:/var/lib/fail2ban
      - ./fail2ban-entrypoint.sh:/fail2ban-entrypoint.sh:ro
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d/postgresql.conf:/etc/fail2ban/filter.d/postgresql.conf:ro
      - ./fail2ban/action.d/docker-iptables.conf:/etc/fail2ban/action.d/docker-iptables.conf:ro
    depends_on:
      postgres:
        condition: service_healthy

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: voltgres-pgbouncer
    restart: unless-stopped
    user: root
    entrypoint: ["/custom-entrypoint.sh"]
    command: ["pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    volumes:
      - ./pgbouncer-entrypoint.sh:/custom-entrypoint.sh:ro
      - caddy-data:/caddy-data:ro
    environment:
      - DOMAIN=${DOMAIN:-}
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-voltgres}@postgres:5432
      - AUTH_TYPE=scram-sha-256
      - AUTH_QUERY=SELECT usename, passwd FROM pg_shadow WHERE usename=$1
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=0
      - RESERVE_POOL_SIZE=5
      - MAX_CLIENT_CONN=200
      - MAX_DB_CONNECTIONS=50
      - SERVER_IDLE_TIMEOUT=300
      - QUERY_WAIT_TIMEOUT=120
      - ADMIN_USERS=${POSTGRES_USER:-postgres}
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path
      - CLIENT_TLS_SSLMODE=require
      - CLIENT_TLS_KEY_FILE=/etc/pgbouncer/tls/client.key
      - CLIENT_TLS_CERT_FILE=/etc/pgbouncer/tls/client.crt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voltgres-net

  caddy:
    image: caddy:2-alpine
    container_name: voltgres-caddy
    restart: unless-stopped
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ALLOWED_IPS=${ALLOWED_IPS:-}
    depends_on:
      - voltgres
    networks:
      - voltgres-net

volumes:
  voltgres-data:
  postgres-data:
  postgres-ssl:
  postgres-logs:
  fail2ban-data:
  caddy-data:
  caddy-config:

networks:
  voltgres-net:
    driver: bridge

services:
  voltgres:
    build:
      context: .
      args:
        NEXT_PUBLIC_GOOGLE_ENABLED: ${NEXT_PUBLIC_GOOGLE_ENABLED:-false}
    container_name: voltgres
    restart: unless-stopped
    ports:
      - "${VOLTGRES_PORT:-3000}:3000"
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - VOLTGRES_DB_PATH=/app/data/voltgres.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - DOMAIN=${DOMAIN:-}
      - NEXT_PUBLIC_GOOGLE_ENABLED=${NEXT_PUBLIC_GOOGLE_ENABLED:-false}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voltgres}
    volumes:
      - voltgres-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voltgres-net

  postgres:
    image: postgres:16-alpine
    container_name: voltgres-postgres
    restart: unless-stopped
    entrypoint: ["/pg-entrypoint.sh"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voltgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - DOMAIN=${DOMAIN:-}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-ssl:/var/lib/postgresql/ssl
      - caddy-data:/caddy-data:ro
      - ./pg-entrypoint.sh:/pg-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voltgres-net

  caddy:
    image: caddy:2-alpine
    container_name: voltgres-caddy
    restart: unless-stopped
    profiles:
      - https
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ALLOWED_IPS=${ALLOWED_IPS:-}
    depends_on:
      - voltgres
    networks:
      - voltgres-net

volumes:
  voltgres-data:
  postgres-data:
  postgres-ssl:
  caddy-data:
  caddy-config:

networks:
  voltgres-net:
    driver: bridge

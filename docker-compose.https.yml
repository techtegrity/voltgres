services:
  caddy:
    image: caddy:2-alpine
    container_name: voltgres-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - voltgres
    networks:
      - voltgres-net

  voltgres:
    ports: !override
      - "3000"

volumes:
  caddy-data:
  caddy-config:
